<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" role="img" aria-label="Алина Васильева">
  <defs>
    <mask id="portraitMask" maskUnits="userSpaceOnUse" x="0" y="0" width="640" height="640" style="mask-type:luminance">
      <rect width="640" height="640" fill="#000"/>
      <image href="data:image/webp;base64," width="640" height="640" preserveAspectRatio="none"/>
