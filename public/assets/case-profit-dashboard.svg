<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" role="img" aria-label="Рост прибыли: ноутбук с коммерческим дашбордом">

<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#020507"/><stop offset=".58" stop-color="#071018"/><stop offset="1" stop-color="#010203"/>
  </linearGradient>
  <linearGradient id="chrome" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#f9fdff"/><stop offset=".16" stop-color="#646d77"/>
    <stop offset=".34" stop-color="#ffffff"/><stop offset=".53" stop-color="#20262d"/>
    <stop offset=".72" stop-color="#dce8ef"/><stop offset="1" stop-color="#707984"/>
  </linearGradient>
  <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#111b24"/><stop offset="1" stop-color="#030609"/>
  </linearGradient>
  <radialGradient id="cyanGlow"><stop offset="0" stop-color="#4fd5ff" stop-opacity=".34"/><stop offset="1" stop-color="#4fd5ff" stop-opacity="0"/></radialGradient>
  <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse">
    <path d="M72 0H0V72" fill="none" stroke="#5b7687" stroke-opacity=".12" stroke-width="1"/>
  </pattern>
  <style>
    .metric{font:700 92px Arial,sans-serif;fill:url(#chrome);letter-spacing:-4px}
    .label{font:500 20px Arial,sans-serif;fill:#b3c0ca;letter-spacing:2.5px}
    .small{font:500 17px Arial,sans-serif;fill:#8796a1;letter-spacing:2px}
    .stroke{fill:none;stroke:#a8bac5;stroke-opacity:.42;stroke-width:3}
  </style>
</defs>

<rect width="900" height="1200" rx="40" fill="url(#bg)"/>
<rect width="900" height="1200" rx="40" fill="url(#grid)"/>
<circle cx="670" cy="260" r="250" fill="url(#cyanGlow)"/>
<g transform="translate(88 150)">
  <path d="M100 55 Q100 20 140 20 H650 Q690 20 690 60 V570 H100Z" fill="url(#panel)" stroke="#5b6974" stroke-width="3"/>
  <rect x="132" y="64" width="526" height="442" rx="18" fill="#020507" stroke="#20313d" stroke-width="2"/>
  <rect x="132" y="64" width="526" height="442" rx="18" fill="url(#grid)" opacity=".65"/>
  <path d="M56 570 H734 L810 650 Q820 666 798 674 H10 Q-12 666 0 650Z" fill="url(#chrome)" opacity=".78"/>
  <rect x="300" y="592" width="190" height="16" rx="8" fill="#222b33"/>
  <g>
    <rect x="166" y="100" width="150" height="96" rx="16" fill="#0b1117" stroke="#30414d"/>
    <text x="184" y="142" class="small">ОБОРОТ</text><text x="184" y="181" class="label">×4,7</text>
    <rect x="334" y="100" width="150" height="96" rx="16" fill="#0b1117" stroke="#30414d"/>
    <text x="352" y="142" class="small">ПРИБЫЛЬ</text><text x="352" y="181" class="label">×8,3</text>
    <rect x="502" y="100" width="124" height="96" rx="16" fill="#0b1117" stroke="#30414d"/>
    <text x="520" y="142" class="small">ЗАПУСКИ</text><text x="520" y="181" class="label">8</text>
  </g>
  <g opacity=".35">
    <path d="M170 430H620M170 360H620M170 290H620M170 220H620" class="stroke"/>
    <path d="M220 210V455M320 210V455M420 210V455M520 210V455M620 210V455" class="stroke"/>
  </g>
</g>
<text x="74" y="915" class="metric">×4,7</text>
<text x="78" y="955" class="label">ОБОРОТ НАПРАВЛЕНИЯ</text>
<text x="500" y="915" class="metric">×8,3</text>
<text x="504" y="955" class="label">МАРЖИНАЛЬНАЯ ПРИБЫЛЬ</text>
<text x="78" y="1085" class="metric">8</text>
<text x="82" y="1125" class="label">ПРОЕКТНЫХ ЗАПУСКОВ</text>
<text x="470" y="1085" class="metric" style="font-size:74px">40+ млн ₽</text>
<text x="474" y="1125" class="label" style="font-size:15px;letter-spacing:1.2px">КОММЕРЧЕСКИХ ПРЕДЛОЖЕНИЙ</text>
</svg>