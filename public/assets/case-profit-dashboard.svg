<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 900" role="img" aria-label="Рост прибыли: оборот, маржинальная прибыль, запуски, тендеры и КП">
  <defs>
    <linearGradient id="chrome" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#111318"/><stop offset=".18" stop-color="#fff"/><stop offset=".38" stop-color="#9da5af"/><stop offset=".56" stop-color="#fff"/><stop offset=".76" stop-color="#717985"/><stop offset="1" stop-color="#f8fbff"/></linearGradient>
    <linearGradient id="cyan" x1="0" y1="1" x2="1" y2="0"><stop offset="0" stop-color="#19d8ff"/><stop offset="1" stop-color="#7df2ff"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="18"/></filter>
    <style>
      .bg{fill:#f7f9fa}.grid{stroke:#dce4e8;opacity:.56}.big{font:600 112px Orbitron,Arial,sans-serif;letter-spacing:-.06em;fill:url(#chrome)}.huge{font:600 154px Orbitron,Arial,sans-serif;letter-spacing:-.08em;fill:url(#chrome)}.label{font:500 22px Orbitron,Arial,sans-serif;letter-spacing:.12em;fill:#4c5660}.step{fill:url(#chrome);stroke:#fff;stroke-width:1.6;filter:drop-shadow(0 22px 32px rgba(45,55,65,.16));animation:rise 3.8s ease-in-out infinite alternate}.coin{fill:url(#chrome);filter:drop-shadow(0 12px 18px rgba(45,55,65,.18));animation:coin 3s ease-in-out infinite}.line{fill:none;stroke:url(#cyan);stroke-width:9;stroke-linecap:round;stroke-dasharray:980;animation:draw 4s ease-in-out infinite alternate}@keyframes draw{from{stroke-dashoffset:980}to{stroke-dashoffset:0}}@keyframes rise{from{transform:translateY(24px);opacity:.56}to{transform:translateY(0);opacity:1}}@keyframes coin{50%{transform:translateY(-18px)}}
    </style>
  </defs>
  <rect class="bg" width="1100" height="900" rx="46"/>
  <g><path class="grid" d="M0 120H1100M0 240H1100M0 360H1100M0 480H1100M0 600H1100M0 720H1100M160 0V900M320 0V900M480 0V900M640 0V900M800 0V900M960 0V900"/></g>
  <circle cx="820" cy="132" r="190" fill="#19d8ff" opacity=".13" filter="url(#glow)"/>
  <path class="line" d="M112 710L230 640L344 560L462 475L590 360L745 260L990 110"/>
  <g opacity=".88">
    <rect class="step" x="520" y="414" width="164" height="54" rx="17"/>
    <rect class="step" x="628" y="350" width="164" height="54" rx="17"/>
    <rect class="step" x="736" y="286" width="164" height="54" rx="17"/>
    <rect class="step" x="844" y="222" width="164" height="54" rx="17"/>
    <circle class="coin" cx="586" cy="386" r="23"/><text x="575" y="394" font-family="Orbitron" font-size="20">₽</text>
    <circle class="coin" cx="704" cy="320" r="23"/><text x="693" y="328" font-family="Orbitron" font-size="20">₽</text>
    <circle class="coin" cx="822" cy="254" r="23"/><text x="811" y="262" font-family="Orbitron" font-size="20">₽</text>
  </g>
  <text class="huge" x="92" y="250">×4,7</text>
  <text class="label" x="102" y="294">ОБОРОТ НАПРАВЛЕНИЯ</text>
  <text class="huge" x="92" y="506">×8,3</text>
  <text class="label" x="102" y="552">МАРЖИНАЛЬНАЯ ПРИБЫЛЬ НАПРАВЛЕНИЯ</text>
  <text class="big" x="746" y="574">8</text>
  <text class="label" x="746" y="620">ПРОЕКТНЫХ ЗАПУСКОВ</text>
  <text class="big" x="114" y="822">2</text>
  <text class="label" x="116" y="866">ТЕНДЕРНЫЕ ПОБЕДЫ</text>
  <text class="big" x="640" y="800">40+</text>
  <text class="big" x="820" y="800">млн ₽</text>
  <text class="label" x="646" y="846">КОММЕРЧЕСКИХ ПРЕДЛОЖЕНИЙ</text>
</svg>
